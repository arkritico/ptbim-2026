  <script>
    
document.addEventListener('DOMContentLoaded', async function() {
  const loading = document.getElementById('__bundler_loading');
  function setStatus(msg) { if (loading) loading.textContent = msg; }

  // Error sink persists across replaceWith since it's on window, not the DOM.
  window.addEventListener('error', function(e) {
    var p = document.body || document.documentElement;
    var d = document.getElementById('__bundler_err') || p.appendChild(document.createElement('div'));
    d.id = '__bundler_err';
    d.style.cssText = 'position:fixed;bottom:12px;left:12px;right:12px;font:12px/1.4 ui-monospace,monospace;background:#2a1215;color:#ff8a80;padding:10px 14px;border-radius:8px;border:1px solid #5c2b2e;z-index:99999;white-space:pre-wrap;max-height:40vh;overflow:auto';
    d.textContent = (d.textContent ? d.textContent + String.fromCharCode(10) : '') +
      '[bundle] ' + (e.message || e.type) +
      (e.filename ? ' (' + e.filename.slice(0, 60) + ':' + e.lineno + ')' : '');
  }, true);

  try {
    const manifestEl = document.querySelector('script[type="__bundler/manifest"]');
    const templateEl = document.querySelector('script[type="__bundler/template"]');
    if (!manifestEl || !templateEl) {
      setStatus('Error: missing bundle data');
      console.error('[bundler] Missing script tags — manifestEl:', !!manifestEl, 'templateEl:', !!templateEl);
      return;
    }

    const manifest = JSON.parse(manifestEl.textContent);
    let template = JSON.parse(templateEl.textContent);

    const uuids = Object.keys(manifest);
    setStatus('Unpacking ' + uuids.length + ' assets...');

    const blobUrls = {};
    await Promise.all(uuids.map(async (uuid) => {
      const entry = manifest[uuid];
      try {
        const binaryStr = atob(entry.data);
        const bytes = new Uint8Array(binaryStr.length);
        for (let i = 0; i < binaryStr.length; i++) bytes[i] = binaryStr.charCodeAt(i);

        let finalBytes = bytes;
        if (entry.compressed) {
          if (typeof DecompressionStream !== 'undefined') {
            const ds = new DecompressionStream('gzip');
            const writer = ds.writable.getWriter();
            const reader = ds.readable.getReader();
            writer.write(bytes);
            writer.close();
            const chunks = [];
            let totalLen = 0;
            while (true) {
              const { done, value } = await reader.read();
              if (done) break;
              chunks.push(value);
              totalLen += value.length;
            }
            finalBytes = new Uint8Array(totalLen);
            let offset = 0;
            for (const chunk of chunks) { finalBytes.set(chunk, offset); offset += chunk.length; }
          } else {
            console.warn('DecompressionStream not available, asset ' + uuid + ' may not render');
          }
        }

        blobUrls[uuid] = URL.createObjectURL(new Blob([finalBytes], { type: entry.mime }));
      } catch (err) {
        console.error('Failed to decode asset ' + uuid + ':', err);
        blobUrls[uuid] = URL.createObjectURL(new Blob([], { type: entry.mime }));
      }
    }));

    const extResEl = document.querySelector('script[type="__bundler/ext_resources"]');
    const extResources = extResEl ? JSON.parse(extResEl.textContent) : [];
    const resourceMap = {};
    for (const entry of extResources) {
      if (blobUrls[entry.uuid]) resourceMap[entry.id] = blobUrls[entry.uuid];
    }

    setStatus('Rendering...');
    for (const uuid of uuids) template = template.split(uuid).join(blobUrls[uuid]);

    // Strip integrity + crossorigin — blob URLs from a file:// document inherit
    // a null origin, so crossorigin forces a CORS fetch that SRI then rejects.
    // The manifest bytes are ours; SRI protects against CDN compromise, not this.
    template = template.replace(/\s+integrity="[^"]*"/gi, '').replace(/\s+crossorigin="[^"]*"/gi, '');

    const resourceScript = '<script>window.__resources = ' +
      JSON.stringify(resourceMap).split('</' + 'script>').join('<\\/' + 'script>') +
      ';</' + 'script>';
    // Inject after <head> so the DOCTYPE stays first; prepending the script
    // would push the parser into quirks mode. DOMParser always emits a <head>
    // (synthesizing one if the source HTML omitted it) but may carry
    // attributes through, so match the full opening tag. slice() rather than
    // replace() keeps us clear of $-pattern substitution in resourceScript.
    const headOpen = template.match(/<head[^>]*>/i);
    if (headOpen) {
      const i = headOpen.index + headOpen[0].length;
      template = template.slice(0, i) + resourceScript + template.slice(i);
    }

    // Parse the template and swap the root element. Scripts inserted via
    // DOMParser/replaceWith are inert per spec — re-create each with
    // createElement so they execute, awaiting onload for src scripts to
    // preserve ordering (React before ReactDOM before Babel before text/babel).
    const doc = new DOMParser().parseFromString(template, 'text/html');
    document.documentElement.replaceWith(doc.documentElement);
    const dead = Array.from(document.scripts);
    for (const old of dead) {
      const s = document.createElement('script');
      for (const a of old.attributes) s.setAttribute(a.name, a.value);
      s.textContent = old.textContent;
      // text/babel scripts with a src: fetch and inline. transformScriptTags
      // does XHR against the src, but blob:null/ from a file:// origin is
      // silently dropped. Inlining makes it a plain inline babel script,
      // which transformScriptTags handles unconditionally.
      if ((s.type === 'text/babel' || s.type === 'text/jsx') && s.src) {
        const r = await fetch(s.src);
        s.textContent = await r.text();
        s.removeAttribute('src');
      }
      const p = s.src ? new Promise(function(r) { s.onload = s.onerror = r; }) : null;
      old.replaceWith(s);
      if (p) await p;
    }
    // Babel standalone auto-transforms type=text/babel on DOMContentLoaded,
    // which fired before we swapped the document. Trigger manually if present.
    if (window.Babel && typeof window.Babel.transformScriptTags === 'function') {
      window.Babel.transformScriptTags();
    }
  } catch (err) {
    setStatus('Error unpacking: ' + err.message);
    console.error('Bundle unpack error:', err);
  }
});

3dce-a895-48e1-902e-bab25518dad8\") format('woff2');\n  unicode-range: U+0100-02BA, U+02BD-02C5, U+02C7-02CC, U+02CE-02D7, U+02DD-02FF, U+0304, U+0308, U+0329, U+1D00-1DBF, U+1E00-1E9F, U+1EF2-1EFF, U+2020, U+20A0-20AB, U+20AD-20C0, U+2113, U+2C60-2C7F, U+A720-A7FF;\n}\n/* latin */\n@font-face {\n  font-family: 'Nunito Sans';\n  font-style: normal;\n  font-weight: 700;\n  font-stretch: 100%;\n  font-display: swap;\n  src: url(\"bdb04fbb-89d3-46b1-831f-b9ff4d88ee6c\") format('woff2');\n  unicode-range: U+0000-00FF, U+0131, U+0152-0153, U+02BB-02BC, U+02C6, U+02DA, U+02DC, U+0304, U+0308, U+0329, U+2000-206F, U+20AC, U+2122, U+2191, U+2193, U+2212, U+2215, U+FEFF, U+FFFD;\n}\n\n\n@font-face {\n  font-family: \"PP Mori\";\n  src: url(\"270c626d-bb25-492d-9923-1bdc0aade2a2\") format(\"woff2\");\n  font-weight: 400;\n  font-style: normal;\n  font-display: swap;\n}\n@font-face {\n  font-family: \"PP Mori\";\n  src: url(\"893bd3d0-b8e2-49de-9e2c-864784ef20ec\") format(\"woff2\");\n  font-weight: 600;\n  font-style: normal;\n  font-display: swap;\n}\n\n:root {\n  /* ── Primary brand colours (from guidelines) ────────────── */\n  --architectural-graphite: #1f2a30;   /* default fg / on white */\n  --optimistic-yellow:      #fcc31e;   /* accent / CTA */\n\n  /* ── Secondary palette (from guidelines, 6 colours) ────── */\n  --foundry-iron:    #172025;  /* deepest — for on-dark hero bg */\n  --carbon-concrete: #28363d;  /* card surface on dark */\n  --cobalt-glaze:    #0a4050;  /* architectural blue — accents */\n  --skyline-haze:    #688996;  /* muted blue-grey — secondary text */\n  --blueprint-blue:  #e3ecef;  /* cool near-white — section bg */\n  --ochre-plaster:   #fedf82;  /* soft yellow — tints / highlights */\n\n  /* ── Hover / state overlays on primary ──────────────────── */\n  --yellow-hover:    #ffd94a;\n  --graphite-hover:  #2c3a43;\n\n  /* ── Status (derived; not in brand guidelines) ───────────\n     Kept conservative and on-brand. */\n  --status-success:  #3f7a4f;  /* muted architectural green */\n  --status-warning:  #c98a1a;  /* deeper optimistic yellow */\n  --status-danger:   #a43e2e;  /* warm brick, not a true red */\n  --status-info:     #0a4050;  /* cobalt glaze */\n\n  /* ── Semantic — LIGHT mode (default) ─────────────────────\n     This is the brand's default per guidelines. */\n  --bg:            #ffffff;\n  --bg-section:    var(--blueprint-blue);\n  --bg-card:       #ffffff;\n  --bg-raised:     #f6f8f9;\n  --bg-input:      #ffffff;\n  --bg-overlay:    rgba(31, 42, 48, 0.6);\n\n  --fg:            var(--architectural-graphite);\n  --fg-heading:    var(--foundry-iron);\n  --fg-muted:      #4a5f6a;   /* WCAG-AA on white — darker than skyline-haze */\n  --fg-on-accent:  var(--architectural-graphite);  /* ink on yellow */\n\n  --border:        rgba(31, 42, 48, 0.12);\n  --border-strong: rgba(31, 42, 48, 0.22);\n\n  --accent:        var(--optimistic-yellow);\n  --accent-hover:  var(--yellow-hover);\n  --accent-tint:   rgba(252, 195, 30, 0.12);\n  --accent-ring:   rgba(252, 195, 30, 0.40);\n\n  /* ── Typography families ────────────────────────────────── */\n  --font-primary:  \"Nunito Sans\", Arial, system-ui, sans-serif;\n  --font-display:  \"PP Mori\", \"Nunito Sans\", Arial, sans-serif;\n  --font-sans:     var(--font-primary);  /* alias */\n  --font-mono:     ui-monospace, \"SF Mono\", Menlo, Consolas, monospace;\n\n  /* ── Type scale — editorial (marketing site) ────────────── */\n  --fz-hero:       clamp(48px, 8vw, 112px);   /* @kind font */ /* PP Mori SemiBold */\n  --fz-display:    clamp(40px, 5vw, 72px);     /* @kind font */\n  --fz-h1:         clamp(32px, 3.5vw, 52px);   /* @kind font */\n  --fz-h2:         clamp(24px, 2.4vw, 36px);   /* @kind font */\n  --fz-h3:         20px;\n\n  /* ── Type scale — operational (app + docs) ─────────────── */\n  --fz-body:       15px;       /* Nunito Sans Regular */\n  --fz-small:      13px;\n  --fz-caption:    11px;       /* uppercase + letter-spacing */\n  --fz-label:      12px;\n  --fz-kpi:        28px;\n\n  /* ── Spacing scale ──────────────────────────────────────── */\n  --sp-1:  4px;\n  --sp-2:  8px;\n  --sp-3:  12px;\n  --sp-4:  16px;\n  --sp-5:  24px;\n  --sp-6:  32px;\n  --sp-7:  48px;\n  --sp-8:  64px;\n  --sp-9:  96px;\n  --sp-10: 128px;\n\n  /* ── Radii — architectural, restrained ──────────────────── */\n  --r-sm: 2px;\n  --r-md: 4px;\n  --r-lg: 8px;\n  --r-xl: 12px;\n  --r-pill: 9999px;\n  /* Note: the brand is largely right-angled. Radii > 4px are\n     rare; pills only for tag chips. Cards are square. */\n\n  /* ── Elevation — flat, not dramatic ─────────────────────── */\n  --shadow-1: 0 1px 2px rgba(31, 42, 48, 0.06);\n  --shadow-2: 0 2px 8px rgba(31, 42, 48, 0.08);\n  --shadow-3: 0 8px 24px rgba(31, 42, 48, 0.10);\n  --shadow-hero: 0 40px 80px -20px rgba(23, 32, 37, 0.35);\n\n  color-scheme: light;\n}\n\n/* ── Dark mode — on-brand hero / app / APR covers ─────────── */\n[data-theme=\"dark\"] {\n  --bg:            var(--foundry-iron);\n  --bg-section:    var(--foundry-iron);\n  --bg-card:       var(--carbon-concrete);\n  --bg-raised:     #334248;\n  --bg-input:      #1a252b;\n\n  --fg:            #e3ecef;                 /* blueprint blue */\n  --fg-heading:    #ffffff;\n  --fg-muted:      var(--skyline-haze);\n\n  --border:        rgba(227, 236, 239, 0.12);\n  --border-strong: rgba(227, 236, 239, 0.22);\n\n  --shadow-1: 0 1px 2px rgba(0, 0, 0, 0.4);\n  --shadow-2: 0 4px 12px rgba(0, 0, 0, 0.35);\n  --shadow-3: 0 12px 32px rgba(0, 0, 0, 0.45);\n\n  color-scheme: dark;\n}\n\n/* ── Base element styles ─────────────────────────────────── */\nhtml, body {\n  font-family: var(--font-primary);\n  font-size: var(--fz-body);\n  font-weight: 400;\n  line-height: 1.55;\n  color: var(--fg);\n  background: var(--bg);\n  -webkit-font-smoothing: antialiased;\n  text-rendering: optimizeLegibility;\n}\n\nh1, h2, h3, h4 {\n  font-family: var(--font-display);\n  font-weight: 600;\n  color: var(--fg-heading);\n  letter-spacing: -0.02em; t:600;font-size:18px;color:#1F3551;margin-bottom:11px;\">As 5 a não perder<\u002Fdiv>\n          <div style=\"display:flex;flex-direction:column;gap:8px;margin-bottom:20px;\">\n            <sc-for list=\"{{ plTop5 }}\" as=\"x\" hint-placeholder-count=\"5\">\n              <div style=\"display:flex;gap:11px;align-items:flex-start;background:#fff;border:1px solid rgba(31,53,81,.1);border-radius:6px;padding:10px 12px;\">\n                <div style=\"font-family:'PP Mori','Nunito Sans',sans-serif;font-weight:600;font-size:12px;color:#D94833;white-space:nowrap;min-width:78px;\">{{ x.d }}<\u002Fdiv>\n                <div style=\"font-size:13px;color:#1F2A30;line-height:1.35;font-weight:700;\">{{ x.t }} <span style=\"color:#888;font-weight:400;\">— {{ x.s }}<\u002Fspan><\u002Fdiv>\n              <\u002Fdiv>\n            <\u002Fsc-for>\n          <\u002Fdiv>\n\n          <div style=\"background:#1F3551;border-radius:8px;padding:14px 15px;margin-bottom:20px;\">\n            <div style=\"font-weight:800;font-size:10px;letter-spacing:.1em;text-transform:uppercase;color:#FFB199;\">Conflito · Quinta tarde<\u002Fdiv>\n            <div style=\"font-size:13px;line-height:1.5;color:#E6ECF3;margin-top:5px;\">{{ plConflito }}<\u002Fdiv>\n          <\u002Fdiv>\n\n          <div style=\"font-family:'PP Mori','Nunito Sans',sans-serif;font-weight:600;font-size:18px;color:#1F3551;margin-bottom:3px;\">Networking<\u002Fdiv>\n          <div style=\"font-weight:800;font-size:10px;letter-spacing:.14em;text-transform:uppercase;color:#D94833;margin-bottom:12px;\">Quem abordar<\u002Fdiv>\n          <div style=\"display:flex;flex-direction:column;gap:10px;margin-bottom:22px;\">\n            <sc-for list=\"{{ plNetwork }}\" as=\"p\" hint-placeholder-count=\"5\">\n              <div style=\"background:#fff;border:1px solid rgba(31,53,81,.1);border-radius:6px;padding:11px 13px;\">\n                <div style=\"font-weight:700;font-size:13.5px;color:#1F2A30;\">{{ p.n }} <span style=\"color:#9AA3AE;font-weight:600;\">{{ p.osuffix }}<\u002Fspan><\u002Fdiv>\n                <div style=\"font-size:12px;color:#555;line-height:1.45;margin-top:2px;\">{{ p.d }}<\u002Fdiv>\n              <\u002Fdiv>\n            <\u002Fsc-for>\n          <\u002Fdiv>\n\n          <div style=\"display:flex;align-items:baseline;justify-content:space-between;margin-bottom:8px;\">\n            <div style=\"font-family:'PP Mori','Nunito Sans',sans-serif;font-weight:600;font-size:18px;color:#1F3551;\">As minhas notas<\u002Fdiv>\n            <div style=\"font-size:11px;font-weight:700;color:#9AA3AE;\">{{ notesCountLabel }}<\u002Fdiv>\n          <\u002Fdiv>\n          <div style=\"font-size:11.5px;color:#7A828C;line-height:1.45;margin-bottom:10px;\">As notas ficam só neste telemóvel. Exporta para guardar um ficheiro privado (backup) ou levar para outro dispositivo.<\u002Fdiv>\n          <div style=\"display:flex;gap:8px;margin-bottom:14px;\">\n            <div onclick=\"{{ onExport }}\" style=\"flex:1;display:flex;align-items:center;justify-content:center;gap:7px;background:#1F3551;color:#fff;font-weight:800;font-size:12px;letter-spacing:.02em;padding:11px 0;border-radius:7px;cursor:pointer;user-select:none;\">\n              <svg viewBox=\"0 0 24 24\" width=\"16\" height=\"16\" fill=\"none\" stroke=\"currentColor\" stroke-width=\"2\" stroke-linecap=\"round\" stroke-linejoin=\"round\"><path d=\"M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4\"><\u002Fpath><path d=\"M7 10l5 5 5-5\"><\u002Fpath><path d=\"M12 15V3\"><\u002Fpath><\u002Fsvg>\n              Exportar ficheiro\n            <\u002Fdiv>\n            <label style=\"flex:1;display:flex;align-items:center;justify-content:center;gap:7px;background:#fff;border:1px solid rgba(31,53,81,.22);color:#1F3551;font-weight:800;font-size:12px;letter-spacing:.02em;padding:11px 0;border-radius:7px;cursor:pointer;user-select:none;\">\n              <svg viewBox=\"0 0 24 24\" width=\"16\" height=\"16\" fill=\"none\" stroke=\"currentColor\" stroke-width=\"2\" stroke-linecap=\"round\" stroke-linejoin=\"round\"><path d=\"M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4\"><\u002Fpath><path d=\"M7 9l5-5 5 5\"><\u002Fpath><path d=\"M12 4v12\"><\u002Fpath><\u002Fsvg>\n              Importar\n              <input type=\"file\" accept=\".json,application/json\" onchange=\"{{ onImportFile }}\" style=\"position:absolute;width:1px;height:1px;opacity:0;overflow:hidden;\">\n            <\u002Flabel>\n          <\u002Fdiv>\n          <sc-if value=\"{{ hasNotes }}\" hint-placeholder-val=\"{{ false }}\">\n            <div style=\"display:flex;flex-direction:column;gap:9px;\">\n              <sc-for list=\"{{ myNotes }}\" as=\"n\" hint-placeholder-count=\"2\">\n                <div style=\"background:#fff;border:1px solid rgba(31,53,81,.1);border-left:4px solid #D94833;border-radius:6px;padding:11px 13px;\">\n                  <div style=\"font-size:10px;font-weight:800;letter-spacing:.04em;color:#9AA3AE;text-transform:uppercase;\">{{ n.meta }}<\u002Fdiv>\n                  <div style=\"font-weight:700;font-size:13px;color:#1F2A30;line-height:1.3;margin-top:3px;\">{{ n.title }}<\u002Fdiv>\n                  <div style=\"font-size:12.5px;color:#444;line-height:1.5;margin-top:6px;white-space:pre-wrap;\">{{ n.text }}<\u002Fdiv>\n                <\u002Fdiv>\n              <\u002Fsc-for>\n            <\u002Fdiv>\n          <\u002Fsc-if>\n          <sc-if value=\"{{ noNotes }}\" hint-placeholder-val=\"{{ true }}\">\n            <div style=\"background:#fff;border:1px dashed rgba(31,53,81,.2);border-radius:6px;padding:18px 14px;text-align:center;font-size:12.5px;color:#8A929C;line-height:1.5;\">Ainda sem notas. Abre uma sessão na Agenda e toca em <b style=\"color:#D94833;\">+ Nota<\u002Fb> para guardar ideias — aparecem aqui compiladas.<\u002Fdiv>\n          <\u002Fsc-if>\n\n          <div style=\"text-align:center;font-size:10px;letter-spacing:.16em;text-transform:uppercase;color:#9AA3AE;margin-top:24px;font-weight:700;\">6.º ptBIM · FEUP · 17–19 jun 2026<\u002Fdiv>\n        <\u002Fdiv>\n        <\u002Fsc-if>\n\n      <\u002Fdiv>\n\n      <!-- BOTTOM NAV -->\n      <div style=\"background:#fff;border-top:1px solid rgba(31,53,81,.12);display:flex;padding:9px 8px 11px;flex-shrink:0;\">\n        <div onclick=\"{{ navAgenda }}\" style=\"{{ navAgendaStyle }}\">\n          <svg viewBox=\"0 0 24 24\" width=\"22\" height=\"22\" fill=\"none\" stroke=\"currentColor\" stroke-width=\"1.9\" stroke-linecap=\"round\" stroke-linejoin=\"round\"><rect x=\"3\" y=\"4\" width=\"18\" height=\"18\" rx=\"2\"><\u002Frect><path d=\"M16 2v4M8 2v4M3 10h18\"><\u002Fpath><\u002Fsvg>\n          <span>Agenda<\u002Fspan>\n        <\u002Fdiv>\n        <div onclick=\"{{ navGrelha }}\" style=\"{{ navGrelhaStyle }}\">\n          <svg viewBox=\"0 0 24 24\" width=\"22\" height=\"22\" fill=\"none\" stroke=\"currentColor\" stroke-width=\"1.9\" stroke-linecap=\"round\" stroke-linejoin=\"round\"><rect x=\"3\" y=\"3\" width=\"18\" height=\"18\" rx=\"2\"><\u002Frect><path d=\"M3 9h18M3 15h18M9 3v18M15 3v18\"><\u002Fpath><\u002Fsvg>\n          <span>Grelha<\u002Fspan>\n        <\u002Fdiv>\n        <div onclick=\"{{ navPlano }}\" style=\"{{ navPlanoStyle }}\">\n          <svg viewBox=\"0 0 24 24\" width=\"22\" height=\"22\" fill=\"none\" stroke=\"currentColor\" stroke-width=\"1.9\" stroke-linecap=\"round\" stroke-linejoin=\"round\"><polygon points=\"12 2 15.1 8.3 22 9.3 17 14.1 18.2 21 12 17.8 5.8 21 7 14.1 2 9.3 8.9 8.3 12 2\"><\u002Fpolygon><\u002Fsvg>\n          <span>Plano<\u002Fspan>\n        <\u002Fdiv>\n      <\u002Fdiv>\n\n    <\u002Fdiv>\n  <\u002Fdiv>\n<\u002Fdiv>\n<\u002Fx-dc>\n<script type=\"text/x-dc\" data-dc-script=\"\" data-props=\"{&quot;$preview&quot;:{&quot;width&quot;:500,&quot;height&quot;:1020}}\">\nclass Component extends DCLogic {\n  state = { view: 'agenda', day: 'qua', onlyMine: false, openNotes: {}, notes: {}, attended: {}, ready: false };\n\n  componentDidMount() {\n    try { this.setState({ notes: JSON.parse(localStorage.getItem('ptbim2026.notes') || '{}'), attended: JSON.parse(localStorage.getItem('ptbim2026.attended') || '{}') }); } catch (e) {}\n    this._waitData();\n  }\n\n  toggleAttended(id) {\n    this.setState(s => {\n      const attended = Object.assign({}, s.attended, { [id]: !s.attended[id] });\n      if (!attended[id]) delete attended[id];\n      try { localStorage.setItem('ptbim2026.attended', JSON.stringify(attended)); } catch (e) {}\n      // assistida revela o botão \"+ Nota\" (sem abrir já o campo); desmarcar fecha qualquer nota aberta\n      const openNotes = Object.assign({}, s.openNotes, { [id]: false });\n      return { attended, openNotes };\n    });\n  }\n  countAttended() { return Object.keys(this.state.attended || {}).filter(k => this.state.attended[k]).length; }\n  _waitData() {\n    if (window.PTBIM_DATA) { this.setState({ ready: true }); return; }\n    let n = 0;\n    const iv = setInterval(() => {\n      if (window.PTBIM_DATA || n++ > 40) { clearInterval(iv); this.setState({ ready: true }); }\n    }, 50);\n  }\n  data() { return window.PTBIM_DATA || { days: [], blocks: {}, extras: {} }; }\n\n  toggleNote(id) {\n    this.setState(s => ({ openNotes: Object.assign({}, s.openNotes, { [id]: !s.openNotes[id] }) }));\n  }\n  setNote(id, val) {\n    this.setState(s => {\n      const notes = Object.assign({}, s.notes, { [id]: val });\n      try { localStorage.setItem('ptbim2026.notes', JSON.stringify(notes)); } catch (e) {}\n      return { notes };\n    });\n  }\n\n  exportNotes() {\n    const notes = this.state.notes || {};\n    const list = this.buildMyNotes();\n    const stamp = new Date();\n    const pad = (n) => ('' + n).padStart(2, '0');\n    const ymd = stamp.getFullYear() + '-' + pad(stamp.getMonth() + 1) + '-' + pad(stamp.getDate());\n    if (!list.length) { try { alert('Ainda não há notas para exportar.'); } catch (e) {} return; }\n    // human-readable copy\n    let txt = '6.º ptBIM 2026 — Notas pessoais\\nFEUP · 17–19 jun 2026\\nExportado: ' + stamp.toLocaleString('pt-PT') + '\\n\\n';\n    list.forEach(n => { txt += '• ' + n.meta + '\\n  ' + n.title + '\\n  ' + n.text.replace(/\\n/g, '\\n  ') + '\\n\\n'; });\n    const payload = { app: 'ptBIM2026', version: 1, exportedAt: stamp.toISOString(), count: list.length, notes: notes, readable: txt };\n    const blob = new Blob([JSON.stringify(payload, null, 2)], { type: 'application/json' });\n    const url = URL.createObjectURL(blob);\n    const a = document.createElement('a');\n    a.href = url; a.download = 'ptBIM2026-notas-' + ymd + '.json';\n    document.body.appendChild(a); a.click(); a.remove();\n    setTimeout(() => URL.revokeObjectURL(url), 2000);\n  }\n  importNotes(e) {\n    const file = (e && e.target && e.target.files && e.target.files[0]) ? e.target.files[0]\n      : (e && e.currentTarget && e.currentTarget.files ? e.currentTarget.files[0] : null);\n    if (!file) return;\n    const r = new FileReader();\n    r.onload = () => {\n      try {\n        const obj = JSON.parse(r.result);\n        const incoming = obj && obj.notes ? obj.notes : obj;\n        if (!incoming || typeof incoming !== 'object') throw new Error('bad');\n        const merged = Object.assign({}, this.state.notes, incoming);\n        try { localStorage.setItem('ptbim2026.notes', JSON.stringify(merged)); } catch (er) {}\n        this.setState({ notes: merged, view: 'plano' });\n        try { alert('Notas importadas: ' + Object.keys(incoming).length + ' sessões.'); } catch (er) {}\n      } catch (err) { try { alert('Ficheiro inválido. Usa um ficheiro ptBIM2026-notas.json exportado por esta app.'); } catch (er) {} }\n    };\n    r.readAsText(file);\n    if (e && e.target) e.target.value = '';\n  }\n\n  roomBadge(room) {\n    const c = room === 'Auditório' ? '#1F3551' : '#5A6B7A';\n    return `display:inline-flex;align-items:center;font-weight:800;font-size:10px;letter-spacing:.03em;color:#fff;background:${c};padding:3px 8px;border-radius:4px;flex-shrink:0;`;\n  }\n  tagStyle(tag) {\n    if (tag === 'TOP') return 'font-weight:800;font-size:9px;letter-spacing:.08em;padding:3px 7px;border-radius:3px;background:#D94833;color:#fff;flex-shrink:0;';\n    if (tag === 'WALLNUT') return 'font-weight:800;font-size:9px;letter-spacing:.08em;padding:3px 7px;border-radius:3px;background:#1F3551;color:#fff;flex-shrink:0;';\n    if (tag === 'VENDA') return 'font-weight:800;font-size:9px;letter-spacing:.08em;padding:3px 7px;border-radius:3px;border:1px solid #D94833;color:#D94833;flex-shrink:0;';\n    return 'display:none;';\n  }\n  noteBtnStyle(hasNote, open) {\n    const base = 'display:inline-block;margin-top:11px;font-size:11px;font-weight:800;letter-spacing:.02em;padding:5px 11px;border-radius:5px;cursor:pointer;user-select:none;';\n    if (hasNote) return base + 'background:#1F3551;color:#fff;';\n    if (open) return base + 'background:#EDEFF2;color:#5A6B7A;';\n    return base + 'background:#fff;border:1px dashed rgba(31,53,81,.3);color:#5A6B7A;';\n  }\n\n  attendBtnStyle(att) {\n    const base = 'display:flex;align-items:center;gap:4px;font-weight:800;font-size:9.5px;letter-spacing:.04em;padding:4px 8px 4px 6px;border-radius:20px;cursor:pointer;user-select:none;white-space:nowrap;';\n    return att ? base + 'background:#1F3551;color:#fff;' : base + 'background:#fff;border:1px solid rgba(31,53,81,.22);color:#9AA3AE;';\n  }\n  cardChrome(t, att) {\n    const picked = !!t.s, wall = !!t.w;\n    const accent = wall ? '#1F3551' : (picked ? '#D94833' : '#CBD3DB');\n    const left = att ? accent : '#E4E8EC';\n    const bg = att ? (picked ? (wall ? '#F6F8FB' : '#FFFDFC') : '#fff') : '#F3F5F7';\n    const border = att ? 'rgba(31,53,81,.1)' : 'rgba(31,53,81,.06)';\n    return {\n      cardStyle: `position:relative;background:${bg};border:1px solid ${border};border-left:4px solid ${left};border-radius:6px;padding:13px 15px;margin-bottom:9px;`,\n      timeStyle: `font-family:'PP Mori','Nunito Sans',sans-serif;font-weight:600;font-size:21px;line-height:1;color:${att ? '#1F3551' : '#AEB6BE'};`,\n      titleStyle: `font-weight:700;font-size:14.5px;line-height:1.3;margin-top:7px;color:${att ? (picked ? '#1F2A30' : '#2C3742') : '#A9B0B8'};`,\n      authorsStyle: `font-size:12.5px;margin-top:4px;line-height:1.4;color:${att ? '#6A7682' : '#B4BBC2'};`,\n      mineStyle: `position:absolute;top:-7px;left:13px;font-size:8.5px;font-weight:800;letter-spacing:.06em;text-transform:uppercase;color:#fff;padding:2px 7px;border-radius:3px;background:${att ? '#D94833' : '#E0AFA4'};`,\n      tagStyle: this.tagStyle(t.tag) + (att ? '' : 'opacity:.5;')\n    };\n  }\n  talkRow(t) {\n    const wall = !!t.w;\n    const att = !!this.state.attended[t.id];\n    const open = !!this.state.openNotes[t.id];\n    const noteVal = this.state.notes[t.id] || '';\n    const hasNote = noteVal.trim().length > 0;\n    const ch = this.cardChrome(t, att);\n    return Object.assign({\n      key: 't-' + t.id, isTalk: true, id: t.id, time: t.t, title: t.ti, authors: t.au,\n      showMine: !!t.s,\n      hasTag: !!t.tag, tagText: t.tag || '',\n      hasQ: !!t.q, qText: t.q || '',\n      qStyle: `background:${wall ? '#EDF0F4' : '#FBF1EE'};border-left:2px solid ${wall ? '#1F3551' : '#D94833'};border-radius:0 3px 3px 0;padding:9px 11px;margin-top:11px;font-size:12px;line-height:1.5;color:#555;`,\n      qAccent: wall ? '#1F3551' : '#D94833',\n      attended: att, attendLabel: att ? 'Assistida' : 'Marcar', attendBtnStyle: this.attendBtnStyle(att),\n      onToggleAttended: () => this.toggleAttended(t.id),\n      noteOpen: open, noteValue: noteVal,\n      noteBtnLabel: hasNote ? 'Nota guardada · editar' : (open ? 'Fechar nota' : '+ Nota'),\n      noteBtnStyle: this.noteBtnStyle(hasNote, open),\n      onToggleNote: () => this.toggleNote(t.id),\n      onNoteInput: (e) => this.setNote(t.id, (e && e.target) ? e.target.value : (e && e.currentTarget ? e.currentTarget.value : String(e)))\n    }, ch);\n  }\n  plenaryRow(seg, dayId) {\n    const id = 'pl-' + dayId + '-' + seg.t;\n    const att = !!this.state.attended[id];\n    const open = !!this.state.openNotes[id];\n    const noteVal = this.state.notes[id] || '';\n    const hasNote = noteVal.trim().length > 0;\n    const ch = this.cardChrome(seg, att);\n    return Object.assign({\n      key: 'p-' + id, isPlenary: true, id, time: seg.t, title: seg.ti, su: seg.su || '', room: seg.room || 'Auditório',\n      showMine: !!seg.s,\n      hasMod: !!seg.mod, mod: seg.mod || '',\n      hasTag: !!seg.tag, tagText: seg.tag || '',\n      hasQ: !!seg.q, qText: seg.q || '', qStyle: 'background:#FBF1EE;border-left:2px solid #D94833;border-radius:0 3px 3px 0;padding:9px 11px;margin-top:11px;font-size:12px;line-height:1.5;color:#555;', qAccent: '#D94833',\n      attended: att, attendLabel: att ? 'Assistida' : 'Marcar', attendBtnStyle: this.attendBtnStyle(att),\n      onToggleAttended: () => this.toggleAttended(id),\n      noteOpen: open, noteValue: noteVal,\n      noteBtnLabel: hasNote ? 'Nota guardada · editar' : (open ? 'Fechar nota' : '+ Nota'),\n      noteBtnStyle: this.noteBtnStyle(hasNote, open),\n      onToggleNote: () => this.toggleNote(id),\n      onNoteInput: (e) => this.setNote(id, (e && e.target) ? e.target.value : (e && e.currentTarget ? e.currentTarget.value : String(e)))\n    }, ch);\n  }\n\n  agendaRows() {\n    const segs = this.data().blocks[this.state.day] || [];\n    const only = this.state.onlyMine;\n    const rows = [];\n    segs.forEach((seg, si) => {\n      if (seg.ty === 'rooms') {\n        const blockPick = seg.rooms.some(r => r.k.some(t => t.s));\n        if (only && !blockPick) return;\n        rows.push({ key: 'bh-' + si, isBlockHeader: true, t: seg.t, lb: seg.lb });\n        if (seg.rota && !only) rows.push({ key: 'rota-' + si, isRota: true, text: seg.rota });\n        seg.rooms.forEach((room) => {\n          const talks = only ? room.k.filter(t => t.s) : room.k;\n          if (!talks.length) return;\n          rows.push({ key: 'rh-' + si + '-' + room.r, isRoomHeader: true, room: room.r, track: room.tr, hasMod: !!room.m, mod: room.m || '', roomBadge: this.roomBadge(room.r) });\n          talks.forEach(t => rows.push(this.talkRow(t)));\n        });\n      } else if (seg.ty === 'plenary') {\n        if (only && !seg.s) return;\n        rows.push(this.plenaryRow(seg, this.state.day));\n      } else if (seg.ty === 'sep') {\n        if (only) return;\n        rows.push({ key: 'sep-' + si, isSep: true, t: seg.t, lb: seg.lb });\n      } else if (seg.ty === 'social') {\n        if (only) return;\n        rows.push({ key: 'soc-' + si, isSocial: true, t: seg.t, lb: seg.lb });\n      }\n    });\n    return rows;\n  }\n\n  gridRows() {\n    const segs = this.data().blocks[this.state.day] || [];\n    const cols = ['Auditório', 'B035', 'B029', 'B026'];\n    const rows = [];\n    segs.forEach((seg, si) => {\n      if (seg.ty === 'rooms') {\n        const cells = cols.map(rn => {\n          const room = seg.rooms.find(r => r.r === rn);\n          if (!room) return { key: 'c-' + si + rn, track: '', mine: false, style: 'background:#F1F3F5;border-radius:5px;', txtStyle: 'display:none;', onTap: () => {} };\n          const mine = room.k.some(t => t.s);\n          const style = mine\n            ? 'background:#FBF1EE;border:1.5px solid #D94833;border-radius:5px;padding:7px 6px;cursor:pointer;min-height:58px;'\n            : 'background:#fff;border:1px solid rgba(31,53,81,.12);border-radius:5px;padding:7px 6px;cursor:pointer;min-height:58px;';\n          return {\n            key: 'c-' + si + rn, track: room.tr, mine, style,\n            txtStyle: `font-size:8.7px;line-height:1.2;font-weight:${mine ? '800' : '600'};color:${mine ? '#B23A29' : '#46535F'};`,\n            onTap: () => this.setState({ view: 'agenda' })\n          };\n        });\n        rows.push({ key: 'g-' + si, isGrid: true, t: seg.t, lb: seg.lb, cells });\n      } else if (seg.ty === 'plenary') {\n        rows.push({ key: 'gb-' + si, isBand: true, t: seg.t, lb: seg.ti, bandStyle: `background:${seg.s ? '#D94833' : '#1F3551'};color:#fff;border-radius:5px;padding:8px 12px;margin-bottom:4px;display:flex;gap:10px;align-items:center;` });\n      } else if (seg.ty === 'sep') {\n        rows.push({ key: 'gs-' + si, isBand: true, t: seg.t, lb: seg.lb, bandStyle: 'background:#E3E7EC;color:#5A6B7A;border-radius:5px;padding:6px 12px;margin-bottom:4px;display:flex;gap:10px;align-items:center;' });\n      } else if (seg.ty === 'social') {\n        rows.push({ key: 'gso-' + si, isBand: true, t: seg.t, lb: seg.lb, bandStyle: 'background:#FBF1EE;color:#B23A29;border:1px solid rgba(217,72,51,.25);border-radius:5px;padding:8px 12px;margin-bottom:4px;display:flex;gap:10px;align-items:center;' });\n      }\n    });\n    return rows;\n  }\n\n  countPicks() {\n    let n = 0;\n    const b = this.data().blocks;\n    Object.keys(b).forEach(d => (b[d] || []).forEach(seg => {\n      if (seg.ty === 'rooms') seg.rooms.forEach(r => r.k.forEach(t => { if (t.s) n++; }));\n      else if (seg.ty === 'plenary' && seg.s) n++;\n    }));\n    return n;\n  }\n  buildMyNotes() {\n    const b = this.data().blocks, notes = this.state.notes, out = [];\n    const dayLabel = { qua: 'Qua 17', qui: 'Qui 18', sex: 'Sex 19' };\n    Object.keys(b).forEach(d => (b[d] || []).forEach(seg => {\n      if (seg.ty === 'rooms') seg.rooms.forEach(r => r.k.forEach(t => {\n        const v = (notes[t.id] || '').trim();\n        if (v) out.push({ key: 'n-' + t.id, meta: dayLabel[d] + ' · ' + t.t + ' · ' + r.r, title: t.ti, text: notes[t.id] });\n      }));\n      else if (seg.ty === 'plenary') {\n        const id = 'pl-' + d + '-' + seg.t; const v = (notes[id] || '').trim();\n        if (v) out.push({ key: 'n-' + id, meta: dayLabel[d] + ' · ' + seg.t + ' · Plenária', title: seg.ti, text: notes[id] });\n      }\n    }));\n    return out;\n  }\n\n  renderVals() {\n    const { view, day, onlyMine } = this.state;\n    const isAgenda = view === 'agenda', isGrelha = view === 'grelha', isPlano = view === 'plano';\n    const days = this.data().days || [];\n    const dObj = days.find(x => x.id === day) || {};\n    const ex = this.data().extras || {};\n\n    const chip = (a) => `display:flex;align-items:center;justify-content:center;flex:1;padding:8px 0;border-radius:7px;font-weight:800;font-size:12px;letter-spacing:.04em;cursor:pointer;${a ? 'background:#1F3551;color:#fff;' : 'background:#EDEFF2;color:#5A6B7A;'}`;\n    const nav = (a) => `display:flex;flex-direction:column;align-items:center;gap:3px;flex:1;cursor:pointer;color:${a ? '#D94833' : '#9AA3AE'};font-weight:${a ? '800' : '600'};font-size:10px;letter-spacing:.02em;`;\n\n    const picks = this.countPicks();\n    const myNotes = this.buildMyNotes();\n\n    return {\n      statLine: this.countAttended() + ' assistidas · ' + myNotes.length + ' notas',\n      showControls: isAgenda || isGrelha,\n      isAgenda, isGrelha, isPlano,\n      dayLabel: dObj.label || '', dayDate: dObj.date || '',\n      chipQua: chip(day === 'qua'), chipQui: chip(day === 'qui'), chipSex: chip(day === 'sex'),\n      dayQua: () => this.setState({ day: 'qua' }), dayQui: () => this.setState({ day: 'qui' }), daySex: () => this.setState({ day: 'sex' }),\n      mineToggleLabel: onlyMine ? 'A mostrar só as minhas escolhas' : 'Mostrar só as minhas escolhas',\n      mineToggleStyle: `display:flex;align-items:center;gap:8px;margin-top:9px;padding:7px 11px;border-radius:6px;cursor:pointer;font-size:11.5px;font-weight:700;user-select:none;${onlyMine ? 'background:#FBF1EE;color:#B23A29;border:1px solid rgba(217,72,51,.3);' : 'background:#F4F6F8;color:#5A6B7A;border:1px solid rgba(31,53,81,.1);'}`,\n      mineDotStyle: `width:14px;height:14px;border-radius:4px;flex-shrink:0;${onlyMine ? 'background:#D94833;' : 'background:#fff;border:1.5px solid #B6BFC8;'}`,\n      toggleMine: () => this.setState({ onlyMine: !onlyMine }),\n\n      agendaRows: this.agendaRows(),\n      gridRows: this.gridRows(),\n\n      navAgenda: () => this.setState({ view: 'agenda' }), navGrelha: () => this.setState({ view: 'grelha' }), navPlano: () => this.setState({ view: 'plano' }),\n      navAgendaStyle: nav(isAgenda), navGrelhaStyle: nav(isGrelha), navPlanoStyle: nav(isPlano),\n\n      plObjetivo: ex.objetivo || '', plLente: ex.lente || '', plConflito: ex.conflito || '',\n      plTop5: (ex.top5 || []).map((x, i) => Object.assign({ key: 'top-' + i }, x)),\n      plNetwork: (ex.networking || []).map((p, i) => ({ key: 'net-' + i, n: p.n, d: p.d, osuffix: p.o ? '· ' + p.o : '' })),\n      myNotes, hasNotes: myNotes.length > 0, noNotes: myNotes.length === 0,\n      notesCountLabel: myNotes.length + (myNotes.length === 1 ? ' nota' : ' notas'),\n      onExport: () => this.exportNotes(), onImportFile: (e) => this.importNotes(e)\n    };\n  }\n}\n<\u002Fscript>\n\n\n<\u002Fbody><\u002Fhtml>"
